<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한세대학교 2026-1 전임교원 시간표</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-container">
                <img src="hanbi.gif" alt="한비 로고" class="logo">
            </div>
            <h1>한세대학교 2026-1 전임교원 시간표</h1>
            <div class="search-wrapper">
                <input type="text" id="nameSearch" placeholder="교수님 성함을 입력하세요" autocomplete="off">
                <div class="search-icon">🔍</div>
            </div>
        </header>

        <main>
            <div class="table-container">
                <table id="timetable">
                    <thead>
                        <tr>
                            <th>시간</th>
                            <th>월</th>
                            <th>화</th>
                            <th>수</th>
                            <th>목</th>
                            <th>금</th>
                        </tr>
                    </thead>
                    <tbody id="timetableBody">
                        <!-- Content will be generated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 한세대학교. All rights reserved.</p>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
